databases:
  - name: jnvest-db
    plan: free
    databaseName: jnvest
    user: jnvest

services:
  - type: web
    name: jnvest
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: |
      cd backend && pip install -e .
      cd ../frontend && npm ci && npm run build
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: jnvest-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_URL
        value: https://data.alpaca.markets
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
