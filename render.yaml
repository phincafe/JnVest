# Render Blueprint for JnVest.
#
# DATABASE_URL is filled in via the dashboard (sync: false) — Render's free tier
# allows only one Postgres per account, so we don't provision one here. Bring your
# own (existing Render Postgres, Neon, Supabase, etc.) or leave DATABASE_URL blank
# to use SQLite (data is lost on every redeploy unless you attach a paid disk).

services:
  - type: web
    name: jnvest
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: .
    buildCommand: |
      cd backend && pip install -e .
      cd ../frontend && npm ci && npm run build
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: ALPACA_DATA_URL
        value: https://data.alpaca.markets
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
